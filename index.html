<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mystic</title>
    <link rel="stylesheet" href="./src/styles/global.css">
</head>
<body>
    <div id="root"></div>

    <script src="./vendor/preact.js"></script>
    <script src="./vendor/hooks.js"></script>
    <script src="./vendor/htm.js"></script>

    <script>
        window.html = htm.bind(preact.h);
        window.useState = preactHooks.useState;
        window.useEffect = preactHooks.useEffect;

        window.loadCSS = function(href) {
            if (document.querySelector(`link[href="${href}"]`)) return;

            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = href;
            link.className = 'dynamic-page-style';
            document.head.appendChild(link);
        };
    </script>

    <script src="./src/routes.js"></script>
    <script src="./src/templates/shell.js"></script>
    <script src="./src/templates/not-found.js"></script>
    <script src="./src/templates/loading.js"></script>
    <script src="./src/templates/error.js"></script>

    <script>
        window.pages = Object.keys(window.RouterConfig.pages);
        window.goTo = function(routeName) { window.location.hash = `#${routeName}`; };

        const routeCache = {};

        function Main() {
            const config = window.RouterConfig;
            const [currentRoute, setCurrentRoute] = useState(() => {
                return window.location.hash.replace('#', '') || config.defaultRoute;
            });
            const [ActiveApp, setActiveApp] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                const handleHash = () => {
                    const nextRoute = window.location.hash.replace('#', '') || config.defaultRoute;
                    if (nextRoute === currentRoute) return;

                    const routeConfig = config.pages[currentRoute];
                    if (routeConfig?.canLeave && !routeConfig.canLeave()) {
                        window.location.hash = `#${currentRoute}`;
                        return;
                    }

                    setCurrentRoute(nextRoute);
                    setError(null);
                    window.scrollTo(0, 0);
                };
                window.addEventListener('hashchange', handleHash);
                return () => window.removeEventListener('hashchange', handleHash);
            }, [currentRoute]);

            useEffect(() => {
                const routeConfig = config.pages[currentRoute];
                if (!routeConfig) return;

                if (routeConfig.canEnter && !routeConfig.canEnter()) {
                    if (currentRoute !== config.defaultRoute) window.goTo(config.defaultRoute);
                    return;
                }

                if (routeConfig.title) document.title = routeConfig.title;
                setError(null);

                if (routeCache[currentRoute]) {
                    document.querySelectorAll('.dynamic-page-style').forEach(s => s.remove());
                    if (routeCache[currentRoute].css) window.loadCSS(routeCache[currentRoute].css);
                    setActiveApp(() => routeCache[currentRoute].component);
                    return;
                }

                setActiveApp(null);

                import(routeConfig.path).then(module => {
                    document.querySelectorAll('.dynamic-page-style').forEach(s => s.remove());
                    if (module.css) window.loadCSS(module.css);
                    routeCache[currentRoute] = { component: module.default, css: module.css };
                    setActiveApp(() => module.default);
                }).catch(err => {
                    setError(err.message || String(err));
                });
            }, [currentRoute]);

            if (!config.pages[currentRoute]) {
                return html`<${NotFound} route=${currentRoute} />`;
            }

            if (error) {
                return html`<${PageError} message=${error} />`;
            }

            if (!ActiveApp) {
                return html`<${Loading} />`;
            }

            return html`
                <${Shell} currentRoute=${currentRoute}>
                    <${ActiveApp} />
                </${Shell}>
            `;
        }

        preact.render(html`<${Main} />`, document.getElementById('root'));
    </script>
</body>
</html>
